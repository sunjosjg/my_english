  {name:'dc100Heartbeat', dur:()=>(0.7+Math.random()*.5).toFixed(2)+'s', tf:'ease',        dir:'alternate'},
  {name:'dc100Tada',      dur:()=>(0.6+Math.random()*.5).toFixed(2)+'s', tf:'ease-in-out', dir:'normal'},
  {name:'dc100Tada',      dur:()=>(0.9+Math.random()*.6).toFixed(2)+'s', tf:'ease',        dir:'alternate'},
  {name:'dc100Jelly',     dur:()=>(0.4+Math.random()*.4).toFixed(2)+'s', tf:'ease-in-out', dir:'alternate'},
  {name:'dc100Jelly',     dur:()=>(0.7+Math.random()*.5).toFixed(2)+'s', tf:'linear',      dir:'normal'},
  {name:'dc100Rush',      dur:()=>(0.7+Math.random()*.6).toFixed(2)+'s', tf:'ease',        dir:'normal'},
  {name:'dc100Rush',      dur:()=>(0.5+Math.random()*.4).toFixed(2)+'s', tf:'ease-in-out', dir:'alternate'},

function previewDaily(pct, totalWrong) {
  const key  = getTierKey(pct, totalWrong);
  const data = DAILY_TIERS[key];
  const cel  = document.getElementById('daily-cele');
  const pick = data.msgs[Math.floor(Math.random() * data.msgs.length)];

  let bgHtml = '';
  if (data.type === 'thumbs100') {
    const thumbVariants = ['👍','👍🏻','👍🏼','👍🏽','👍🏾','👍🏿','👍👍','👍🏻👍🏼','👍🏽👍🏾','👍👍👍','🤙','🤜🤛','✌️','🙌','👏'];
    const positions = [];
    for (let row = 0; row < 5; row++) for (let col = 0; col < 7; col++) {
      positions.push([col*14+2+Math.random()*6, row*18+2+Math.random()*8]);
    }
    bgHtml = positions.map((p, i) => {
      const a = ANIMS100[i % ANIMS100.length];
      const dur = a.dur(), delay = (Math.random()*1.5).toFixed(2)+'s';
      const sz = 18 + Math.floor(Math.random()*36);
      const emoji = thumbVariants[Math.floor(Math.random()*thumbVariants.length)];
      return `<span class="dc-bg-thumb dc-bg-pop" style="left:${p[0].toFixed(1)}%;top:${p[1].toFixed(1)}%;font-size:${sz}px;animation:${a.name} ${dur} ${a.tf} ${delay} infinite ${a.dir}">${emoji}</span>`;
    }).join('');
  } else {
    const allPos = [[5,10],[15,80],[85,15],[90,75],[50,5],[30,90],[70,88],[8,45],[92,45],[20,25],[75,30],[45,85],[60,10],[35,60],[80,55],[25,50],[65,70],[40,20],[55,40],[78,25]];
    const bgEmoji = data.bgEmojis[Math.floor(Math.random() * data.bgEmojis.length)];
    bgHtml = allPos.slice(0, data.bgCount).map((p, i) => {
      const sz = 22 + (i % 3) * 10;
      return `<span class="dc-bg-thumb" style="left:${p[0]}%;top:${p[1]}%;font-size:${sz}px;animation:dcBgFloat 1.4s ease-in-out ${(i*0.11).toFixed(2)}s infinite alternate">${bgEmoji}</span>`;
    }).join('');
  }

  const centerHtml = (data.type === 'thumbs100')
    ? `<div class="dc-100-wrap"><div class="dc-crowd" id="dc-crowd"></div><div class="dc-main">👍</div></div>`
    : `<span class="dc-main-emoji">${pick.emoji}</span>`;
  cel.innerHTML = bgHtml + centerHtml +
    `<div class="dc-msg">${pick.msg}</div><div class="dc-sub">${pick.sub}</div>`;
  if (data.type === 'thumbs100') {
    const crowd = cel.querySelector('#dc-crowd');
    for (let i = 0; i < 10; i++) {
      const angle = (i / 10) * Math.PI * 2;
      const r = 105, x = 140 + r * Math.cos(angle) - 15, y = 140 + r * Math.sin(angle) - 15;
      const sp = document.createElement('span');
      sp.className = 'dc-crowd-thumb'; sp.textContent = '👍';
      sp.style.left = x + 'px'; sp.style.top = y + 'px';
      sp.style.animationDelay = (i * 0.07) + 's';
      crowd.appendChild(sp);
    }
    // 따봉 클릭 터지기
    cel.querySelectorAll('.dc-bg-pop').forEach(el => {
      el.style.cursor = 'pointer';
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        const rect = this.getBoundingClientRect();
        const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
        const pieces = ['👍','✨','💥','⭐','🎉','🌟','💯'];
        for (let k = 0; k < 8; k++) {
          const p = document.createElement('span');
          p.className = 'dc-pop-piece';
          p.textContent = pieces[Math.floor(Math.random()*pieces.length)];
          const angle = (k/8)*Math.PI*2, dist = 60+Math.random()*80;
          p.style.setProperty('--dx', Math.cos(angle)*dist+'px');
          p.style.setProperty('--dy', Math.sin(angle)*dist+'px');
          p.style.setProperty('--dr', (Math.random()*720-360)+'deg');
          p.style.left = cx+'px'; p.style.top = cy+'px';
          document.body.appendChild(p);
          p.addEventListener('animationend', () => p.remove());
        }
        this.style.animation = 'none'; this.style.opacity = '0';
        setTimeout(() => this.remove(), 100);
      }, {once: true});
    });
  }
  const bg = data.bgs[Math.floor(Math.random() * data.bgs.length)];
  cel.style.background = bg;
  cel.style.backgroundSize = '400% 400%';
  cel.className = 'show';

  if (data.type === 'thumbs100') {
    const flyEmojis = ['👍','👍🏻','👍🏼','👍🏽','👍🏾','👍🏿','👍👍','🏆','💯','✨','🎉','⭐','🌟','🥇','💪','🙌','👏'];
    let flyCount = 0;
    const flyIv = setInterval(() => {
      if (flyCount++ > 60 || !cel.classList.contains('show')) { clearInterval(flyIv); return; }
      const el = document.createElement('span');
      el.className = 'dc-fly-emoji';
      el.textContent = flyEmojis[Math.floor(Math.random() * flyEmojis.length)];
      el.style.left   = (Math.random() * 94) + 'vw';
      el.style.bottom = '-60px';
      el.style.fontSize = (24 + Math.floor(Math.random() * 28)) + 'px';
      el.style.animationDuration = (1.2 + Math.random() * 1.5) + 's';
      cel.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }, 80);
  }
}

function previewSentence(isPerfect) {
  const theme = CELE_THEMES[Math.floor(Math.random() * CELE_THEMES.length)];
  const pool  = isPerfect ? CELE_PERFECT : CELE_DONE;
  const pick  = pool[Math.floor(Math.random() * pool.length)];
  const cel   = document.getElementById('celebration');
  cel.style.background = theme.bg;
  cel.style.backgroundSize = '400% 400%';
  const emojiEl = document.getElementById('cele-emoji');
  emojiEl.textContent    = pick.emoji;
  emojiEl.style.animation = theme.anim;
  document.getElementById('cele-msg').textContent = pick.msg;
  document.getElementById('cele-sub').textContent = pick.sub;
  // 기존 fly 이모지 제거
  cel.querySelectorAll('.fly-emoji').forEach(e => e.remove());
  cel.classList.add('show');
  const total = isPerfect ? 60 : 20, interval = isPerfect ? 80 : 200;
  let count = 0;
  const iv = setInterval(() => {
    if (count++ > total) { clearInterval(iv); return; }
    const el = document.createElement('span');
    el.className = 'fly-emoji';
    el.textContent = theme.fly[Math.floor(Math.random() * theme.fly.length)];
    el.style.left = (Math.random() * 95) + 'vw';
    el.style.bottom = '-50px';
    el.style.animationDuration = (1.0 + Math.random() * 1.5) + 's';
    cel.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }, interval);
}
function hideCelebration() { document.getElementById('celebration').classList.remove('show'); }
