<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>찬희 영어 단어장</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="찬희하이">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
    :root {
      --primary: #5b4fcf; --primary-light: #7c71e0; --primary-bg: #eef2ff;
      --green: #10b981; --green-bg: #ecfdf5; --red: #ef4444; --red-bg: #fef2f2;
      --yellow: #f59e0b; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b;
      --muted: #64748b; --border: #e2e8f0; --radius: 14px;
    }
    body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    button, input, select, textarea { font-family: inherit; }
    .page { padding: 16px; max-width: 860px; margin: 0 auto; }
    .section-label { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin: 20px 0 8px; }
    .chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { padding: 8px 18px; border: 2px solid var(--border); border-radius: 30px; background: var(--card); font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.15s; user-select: none; }
    .chip:hover { border-color: var(--primary-light); }
    .chip.on { background: var(--primary); color: #fff; border-color: var(--primary); }
    .app-header { display: flex; align-items: center; justify-content: center; min-height: 46px; padding-bottom: 8px; }
    .app-title { font-size: 26px; font-weight: 800; color: var(--primary); }
    .app-sub { font-size: 15px; color: var(--muted); margin-top: 4px; }
    .unit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
    .unit-card { padding: 14px 12px; border: 2px solid var(--border); border-radius: var(--radius); background: var(--card); cursor: pointer; transition: all 0.15s; position: relative; }
    .unit-card:hover { border-color: var(--primary-light); transform: translateY(-1px); }
    .unit-card.on { border-color: var(--primary); background: var(--primary-bg); border-bottom: 6px solid var(--primary); }
    .unit-card.done { border-color: var(--green); background: var(--green-bg); opacity: 0.75; }
    .unit-card.done.on { border-color: var(--green); background: var(--green-bg); opacity: 1; border-bottom: 6px solid var(--green); }
    .unit-card .uc-id { font-weight: 700; color: var(--primary); font-size: 16px; }
    .unit-card.done .uc-id { color: var(--green); }
    .unit-card .uc-label { font-size: 13px; color: var(--muted); margin-top: 3px; line-height: 1.3; }
    .unit-done-btn {
      position: absolute; top: 7px; right: 8px;
      background: none; border: none; font-size: 20px;
      cursor: pointer; padding: 2px; line-height: 1;
      opacity: 0.35; transition: opacity 0.15s, transform 0.15s;
    }
    .unit-done-btn:hover { opacity: 1; transform: scale(1.2); }
    .unit-card.done .unit-done-btn { opacity: 1; }
    .mode-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 8px; }
    .mode-print-row { display: flex; gap: 8px; grid-column: 1 / -1; }
    .mode-card { padding: 10px 12px; border: 2px solid var(--border); border-radius: var(--radius); background: var(--card); text-align: center; cursor: pointer; transition: all 0.15s; }
    .mode-card:hover { border-color: var(--primary-light); }
    .mode-card.on { border-color: var(--primary); background: var(--primary-bg); }
    .mode-card .mc-top { display: flex; align-items: center; justify-content: center; gap: 6px; line-height: 1; }
    .mode-card .mc-icon { font-size: 22px; flex-shrink: 0; }
    .mode-card .mc-label { font-size: 14px; font-weight: 700; }
    .mode-card .mc-desc { font-size: 12px; color: var(--muted); margin-top: 3px; display: block; }
    .start-btn { width: 100%; padding: 16px; margin-top: 20px; margin-bottom: 32px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius); font-size: 18px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .start-btn:hover { background: var(--primary-light); }
    .start-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
    .check-btn { width: 100%; padding: 14px; margin-top: 8px; margin-bottom: 32px; background: var(--card); border: 2px solid #10b981; color: #10b981; border-radius: var(--radius); font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .check-btn:hover { background: #ecfdf5; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 15px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }


    /* PRINT */
    #print-area { display: none; }
    @media print {
      body > * { display: none !important; }
      #print-area { display: block !important; font-family: sans-serif; }
      @page { margin: 0; size: A4; duplex: simplex; }

      /* ── 1페이지: 문장 빈칸 ── */
      #pt-page1 { padding: 8mm 12mm; page-break-after: always; }
      .pt-title { font-size: 14pt; font-weight: bold; text-align: center; margin-bottom: 2mm; }
      .pt-meta  { font-size: 9pt; color: #555; text-align: center; margin-bottom: 4mm; }
      .pt-grid  { display: grid; grid-template-columns: 1fr 1fr; column-gap: 8mm; grid-auto-flow: column; }
      .pt-item  { display: flex; align-items: baseline; gap: 5px; padding: 2.5mm 0; border-bottom: 1px dotted #ccc; break-inside: avoid; }
      .pt-no       { color: #999; min-width: 18px; font-size: 9pt; }
      .pt-sentence { flex: 1; line-height: 1.3; font-size: 9.5pt; }
      .pt-blank    { display: inline-block; border-bottom: 1.2px solid #333; min-width: 40px; vertical-align: bottom; height: 1em; }
      .pt-bank      { margin-top: 3mm; padding: 1.5mm 4mm; border: 1px solid #999; border-radius: 3px; }
      .pt-bank-title { font-weight: bold; font-size: 9pt; margin-bottom: 1mm; }
      .pt-bank-words { display: flex; flex-wrap: wrap; gap: 3px 10px; font-size: 9pt; }
      /* ── 1페이지 정답 영역 ── */
      .pt-ans-section { margin-top: 2mm; border-top: 1px dashed #bbb; padding-top: 3mm; display: flex; flex-wrap: wrap; gap: 3mm; }
      .pt-ans-col { flex: 1; }
      .pt-ans-label { font-size: 8pt; font-weight: bold; color: #888; margin-bottom: 1.5mm; }
      .pt-ans-list { columns: 2; column-gap: 6px; font-size: 8pt; color: #555; }
      .pt-ans-item { display: block; line-height: 1.7; }

      /* ── 3페이지: 전체 복습 (가로) ── */
      @page landscape { size: A4 landscape; margin: 10mm; }
      #pt-page3 { padding: 0; page-break-before: always; page: landscape; }
      .pr-title { font-size: 13pt; font-weight: bold; text-align: center; margin-bottom: 4mm; }
      .pr-table { width: 100%; border-collapse: collapse; font-size: 9pt; }
      .pr-table th { background: #f0f0f0; font-weight: bold; text-align: center; padding: 1.5mm 2mm; border: 1px solid #ccc; font-size: 8.5pt; }
      .pr-table td { padding: 1.5mm 3mm; border: 1px solid #ddd; vertical-align: middle; line-height: 1.2; }
      .pr-table tr:nth-child(even) td { background: #fafafa; }
      .pr-no    { width: 7mm; text-align: center; color: #999; font-size: 8pt; }
      .pr-en    { width: 40mm; font-weight: 600; }
      .pr-kr    { width: 40mm; color: #444; }
      .pr-sent  { width: 80mm; color: #333; }
      .pr-ans   { font-weight: bold; color: #5b4fcf; text-decoration: underline; }

      /* ── 2페이지: 단어 쓰기 (반으로 잘라서 사용) ── */
      #pt-page2 { width: 210mm; height: 297mm; display: flex; flex-direction: column; overflow: hidden; padding: 10mm 0 8mm; }
      .pw-page-title { text-align: center; font-size: 13pt; font-weight: bold; margin-bottom: 6mm; }
      .pw-cut-guide  { text-align: center; font-size: 8pt; color: #aaa; margin-bottom: 3mm; letter-spacing: 0.05em; }
      .pw-body { display: flex; flex: 1; overflow: hidden; }
      .pw-half { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 0 8mm; }
      .pw-divider { width: 1px; border-left: 2px dashed #aaa; position: relative; flex-shrink: 0; }
      .pw-divider::before { content: '✂'; position: absolute; top: 0; left: 50%; transform: translateX(-50%); font-size: 13pt; color: #999; line-height: 1; }
      .pw-section-header { font-size: 10pt; font-weight: bold; text-align: center; padding: 2mm 0; border-bottom: 2px solid #333; margin-bottom: 1mm; }
      .pw-row { display: flex; align-items: center; border-bottom: 1px dotted #ddd; overflow: hidden; }
      .pw-no   { font-size: 8pt; color: #bbb; min-width: 16px; flex-shrink: 0; }
      .pw-word { font-size: 11pt; font-weight: 600; white-space: nowrap; padding-right: 4px; flex-shrink: 0; }
      .pw-line { flex: 1; border-bottom: 1px solid #bbb; margin: 0 2px 2px; align-self: flex-end; min-width: 20px; }
    }
  </style>
</head>
<body>


<div class="page">
  <div class="app-header">
    <div class="app-title">📚 찬희 영어 단어장</div>
  </div>

  <div id="course-section">
    <div class="section-label">과정 선택</div>
    <div class="chip-group" id="course-chips"></div>
  </div>

  <div id="type-section" style="display:none">
    <div class="section-label">유형 선택</div>
    <div class="chip-group" id="type-chips"></div>
  </div>

  <div id="unit-section" style="display:none">
    <div class="section-label">단원 선택</div>
    <div class="unit-grid" id="unit-grid"></div>
  </div>

  <div class="section-label">학습 모드</div>
  <div class="mode-grid">
    <div class="mode-card on" data-mode="study">
      <div class="mc-top"><span class="mc-icon">🃏</span><span class="mc-label">플래시카드</span></div>
      <span class="mc-desc">단어 암기</span>
    </div>
    <div class="mode-card" data-mode="sentence">
      <div class="mc-top"><span class="mc-icon">🧩</span><span class="mc-label">문장 완성</span></div>
      <span class="mc-desc">드래그 빈칸 채우기</span>
    </div>
    <div class="mode-card" data-mode="daily">
      <div class="mc-top"><span class="mc-icon">📝</span><span class="mc-label">Daily Test</span></div>
      <span class="mc-desc">3단계 최종 테스트</span>
    </div>
    <div class="mode-print-row">
      <div class="mode-card" style="flex:1" data-mode="print-page3">
        <div class="mc-top"><span class="mc-icon">📋</span><span class="mc-label">학습 인쇄</span></div>
        <span class="mc-desc">전체 복습 페이지만</span>
      </div>
      <div class="mode-card" style="flex:1" data-mode="print-custom-lg">
        <div class="mc-top"><span class="mc-icon">📋</span><span class="mc-label">싱글 인쇄</span></div>
        <span class="mc-desc">단원·유형 선택 후 인쇄</span>
      </div>
      <div class="mode-card" style="flex:1" data-mode="print-custom">
        <div class="mc-top"><span class="mc-icon">📄</span><span class="mc-label">멀티 인쇄</span></div>
        <span class="mc-desc">단원·유형 선택 후 인쇄</span>
      </div>
      <div class="mode-card" style="flex:1" data-mode="answers">
        <div class="mc-top"><span class="mc-icon">✂</span><span class="mc-label">정답 확인</span></div>
        <span class="mc-desc">코드 입력 후 정답 조회</span>
      </div>
    </div>
  </div>

</div>

<!-- Print area -->
<div id="print-area">
  <!-- 1페이지: 문장 빈칸 -->
  <div id="pt-page1">
    <div class="pt-title" id="pt-title"></div>
    <div class="pt-meta"  id="pt-meta"></div>
    <div class="pt-grid"  id="pt-grid"></div>
    <div class="pt-bank">
      <div class="pt-bank-title">✦ Word Bank</div>
      <div class="pt-bank-words" id="pt-bank-words"></div>
    </div>
    <div class="pt-ans-section">
      <div style="width:100%;font-size:8pt;font-weight:bold;color:#555;margin-bottom:1.5mm;" id="pt-ans-title"></div>
      <div class="pt-ans-col">
        <div class="pt-ans-label">✂ 문장 정답</div>
        <div class="pt-ans-list" id="pt-ans-sentence"></div>
      </div>
      <div class="pt-ans-col">
        <div class="pt-ans-label" id="pt-ans-label-left"></div>
        <div class="pt-ans-list" id="pt-ans-left"></div>
      </div>
      <div class="pt-ans-col">
        <div class="pt-ans-label" id="pt-ans-label-right"></div>
        <div class="pt-ans-list" id="pt-ans-right"></div>
      </div>
    </div>
  </div>
  <!-- 2페이지: 단어 쓰기 (반으로 잘라서 사용) -->
  <div id="pt-page2">
    <div class="pw-page-title" id="pw-page-title"></div>
    <div class="pw-cut-guide">✂ 가운데 점선을 따라 자르세요 — 왼쪽: 한글 쓰기 / 오른쪽: 영어 쓰기</div>
    <div class="pw-body">
      <div class="pw-half">
        <div class="pw-section-header">영어 → 한글 쓰기</div>
        <div id="pw-en-list"></div>
      </div>
      <div class="pw-divider"></div>
      <div class="pw-half">
        <div class="pw-section-header">한글 → 영어 쓰기</div>
        <div id="pw-kr-list"></div>
      </div>
    </div>
  </div>
  <!-- 3페이지: 전체 복습 (영어·한글·문장·쓰기) -->
  <div id="pt-page3">
    <div class="pr-title" id="pr-title"></div>
    <table class="pr-table">
      <tbody id="pr-tbody"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let manifest = null;
let selCourse = null;
let selType   = null;
let selUnit   = null;
let selMode   = 'study';
let words     = [];
let doneSet   = new Set();

(async () => {
  try {
    const mRes = await fetch('data/index.json');
    manifest = await mRes.json();
  } catch(e) {
    showToast('⚠️ data/index.json 로딩 실패');
    return;
  }
  // localStorage에서 먼저 로드
  try { doneSet = new Set(JSON.parse(localStorage.getItem('myeng_done') || '[]')); } catch {}
  // 서버 API와 머지 (Node 서버 전용 — 없어도 동작)
  try {
    const dRes = await fetch('/api/done');
    const doneData = await dRes.json();
    doneData.done.forEach(k => doneSet.add(k));
    saveDoneLocal();
  } catch { /* 오프라인 무시 */ }
  renderCourses();
  if (manifest.courses.length > 0) {
    const saved = JSON.parse(localStorage.getItem('myeng_sel') || 'null');
    selectCourse(manifest.courses[0].id, saved);
  }
})();

function renderCourses() {
  const wrap = document.getElementById('course-chips');
  wrap.innerHTML = '';
  manifest.courses.forEach(c => {
    const el = chip(c.label, () => selectCourse(c.id));
    wrap.appendChild(el);
  });
  document.getElementById('course-section').style.display =
    manifest.courses.length <= 1 ? 'none' : '';
}

function saveSelection() {
  if (selCourse && selType && selUnit)
    localStorage.setItem('myeng_sel', JSON.stringify({ c: selCourse.id, t: selType.id, u: selUnit.id }));
}

function selectCourse(id, saved) {
  selCourse = manifest.courses.find(c => c.id === id);
  selType = null; selUnit = null;
  setChipsActive('course-chips', id, manifest.courses, 'id');
  const typeChips = document.getElementById('type-chips');
  typeChips.innerHTML = '';
  selCourse.types.forEach(t => {
    const el = chip(t.label, () => { selectType(t.id); saveSelection(); });
    typeChips.appendChild(el);
  });
  document.getElementById('type-section').style.display = 'block';
  document.getElementById('unit-section').style.display = 'none';
  if (selCourse.types.length > 0) {
    const typeId = saved?.t || selCourse.types[0].id;
    selectType(typeId, saved?.u);
  } else updateStartBtn();
}

function selectType(id, savedUnitId) {
  selType = selCourse.types.find(t => t.id === id);
  selUnit = null;
  setChipsActive('type-chips', id, selCourse.types, 'id');
  renderUnits();
  document.getElementById('unit-section').style.display = 'block';
  if (selType.units.length > 0) {
    const targetUnit = (savedUnitId && selType.units.find(u => u.id === savedUnitId))
      || selType.units.find(u => !isDone(selCourse.id, selType.id, u.id))
      || selType.units[selType.units.length - 1];
    selUnit = targetUnit;
    document.querySelectorAll('.unit-card').forEach(c => c.classList.remove('on'));
    const targetCard = document.querySelector(`.unit-card[data-uid="${targetUnit.id}"]`);
    if (targetCard) targetCard.classList.add('on');
  }
  updateStartBtn();
}

function isDone(cId, tId, uId) {
  return doneSet.has(`${cId}_${tId}_${uId}`);
}

function saveDoneLocal() {
  localStorage.setItem('myeng_done', JSON.stringify([...doneSet]));
}

async function toggleUnitDone(cId, tId, uId, event) {
  event.stopPropagation();
  const key = `${cId}_${tId}_${uId}`;
  const nowDone = !doneSet.has(key);
  if (nowDone) doneSet.add(key); else doneSet.delete(key);
  saveDoneLocal();
  try {
    await fetch('/api/done', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key, done: nowDone })
    });
  } catch { /* 오프라인 무시 */ }
  renderUnits();
  // 선택 유지
  const prevSelected = selUnit;
  if (prevSelected) {
    const card = document.querySelector(`.unit-card[data-uid="${prevSelected.id}"]`);
    if (card) card.classList.add('on');
  }
  showToast(nowDone ? '✅ 완료 표시!' : '완료 취소');
}

function renderUnits() {
  const grid = document.getElementById('unit-grid');
  grid.innerHTML = '';
  selType.units.forEach(u => {
    const done = isDone(selCourse.id, selType.id, u.id);
    const el = document.createElement('div');
    el.className = 'unit-card' + (done ? ' done' : '');
    el.dataset.uid = u.id;
    const fmtShort = s => s.replace(/(\d)\.(\d)/g, '$1·$2');
    el.innerHTML = `
      <div class="uc-id">${fmtShort(u.short)}</div>
      <div class="uc-label">${fmtShort(u.label)}</div>
      <button class="unit-done-btn" title="${done ? '완료 취소' : '완료 표시'}">${done ? '✅' : '⬜'}</button>`;
    el.onclick = () => {
      document.querySelectorAll('.unit-card').forEach(c => c.classList.remove('on'));
      el.classList.add('on');
      selUnit = u;
      saveSelection();
      updateStartBtn();
    };
    el.querySelector('.unit-done-btn').onclick = (e) =>
      toggleUnitDone(selCourse.id, selType.id, u.id, e);
    grid.appendChild(el);
  });
}

document.querySelectorAll('.mode-card').forEach(mc => {
  mc.onclick = () => {
    if (mc.dataset.mode === 'answers') { location.href = 'answers.html'; return; }
    if (mc.dataset.mode === 'print-custom') { location.href = 'print-custom.html'; return; }
    if (mc.dataset.mode === 'print-custom-lg') {
      if (!selUnit) { showToast('단원을 먼저 선택하세요'); return; }
      location.href = `print-custom-lg.html?c=${selCourse.id}&t=${selType.id}&u=${selUnit.id}`;
      return;
    }
    if (mc.dataset.mode === 'print-page3') { startPrintPage3Only(); return; }
    document.querySelectorAll('.mode-card').forEach(m => m.classList.remove('on'));
    mc.classList.add('on');
    selMode = mc.dataset.mode;
    if (!selUnit) { showToast('단원을 먼저 선택하세요'); return; }
    navGo(selMode);
  };
});

function updateStartBtn() { updateNavUnit(); }

function goCheck() {
  if (!selUnit) return;
  const params = new URLSearchParams({ c: selCourse.id, t: selType.id, u: selUnit.id });
  window.location.href = `check.html?${params}`;
}


async function startPrintPage3Only() {
  if (!await loadWords()) return;
  document.getElementById('pt-page1').style.display = 'none';
  document.getElementById('pt-page2').style.display = 'none';
  document.getElementById('pt-page3').style.display = '';
  const afterPrint = () => {
    document.getElementById('pt-page1').style.display = '';
    document.getElementById('pt-page2').style.display = '';
    window.removeEventListener('afterprint', afterPrint);
  };
  window.addEventListener('afterprint', afterPrint);

  const stripDate = s => s.replace(/\d{4}년\s*\d{1,2}월\s*/g, '').trim();
  const fmtDot = s => s.replace(/(\d)\.(\d)/g, '$1·$2');
  const unitLabel = `${stripDate(selCourse.label)}  ${stripDate(selType.label)}  ${fmtDot(selUnit.short)}. ${fmtDot(stripDate(selUnit.label))}`;
  const printWords = shuffle([...words]);
  document.getElementById('pr-title').textContent = unitLabel + ' — 전체';
  document.getElementById('pr-tbody').innerHTML = printWords.map(w => {
    const blankSpaces = '\u00A0'.repeat((w.answer.length + 4) * 2);
    const sentFull  = w.sentence.replace('___', `<span class="pr-ans">${w.answer}</span>`);
    const sentBlank = w.sentence.replace('___', `<u style="text-decoration-color:#333">${blankSpaces}</u>`);
    return `<tr>
      <td class="pr-en">${w.english}</td>
      <td class="pr-kr">${w.korean.split(',')[0].trim()}</td>
      <td class="pr-sent">${sentFull}</td>
      <td class="pr-sent">${sentBlank}</td>
    </tr>`;
  }).join('');
  window.print();
}

function startPrint(showAll = true) {
  document.getElementById('pt-page3').style.display = showAll ? '' : 'none';
  const afterPrint = () => {
    document.getElementById('pt-page3').style.display = '';
    window.removeEventListener('afterprint', afterPrint);
  };
  window.addEventListener('afterprint', afterPrint);
  const stripDate = s => s.replace(/\d{4}년\s*\d{1,2}월\s*/g, '').trim();
  const fmtDot = s => s.replace(/(\d)\.(\d)/g, '$1·$2');
  const unitLabel = `${stripDate(selCourse.label)}  ${stripDate(selType.label)}  ${fmtDot(selUnit.short)}. ${fmtDot(stripDate(selUnit.label))}`;

  // ── 매 인쇄마다 전체 셔플 ──
  const printWords = shuffle([...words]);

  // ── 1페이지: 문장 빈칸 ──
  document.getElementById('pt-title').textContent = unitLabel;
  document.getElementById('pt-meta').textContent = '';
  const grid = document.getElementById('pt-grid');
  grid.innerHTML = '';
  const half = Math.ceil(printWords.length / 2);
  grid.style.gridTemplateRows = `repeat(${half}, auto)`;
  printWords.forEach((w, i) => {
    const bw = (w.answer.length + 5) + 'ch';
    const sentHtml = w.sentence.replace('___', `<span class="pt-blank" style="min-width:${bw}"></span>`);
    const item = document.createElement('div');
    item.className = 'pt-item';
    item.innerHTML = `<span class="pt-no">${i+1}.</span><span class="pt-sentence">${sentHtml}</span>`;
    grid.appendChild(item);
  });
  const shuffled = shuffle([...printWords]);
  const bankNumMap = {};
  shuffled.forEach((w, i) => { bankNumMap[w.answer] = i + 1; });
  document.getElementById('pt-bank-words').innerHTML =
    shuffled.map((w, i) => `<span>${i+1}. ${w.answer}</span>`).join(' &nbsp;·&nbsp; ');

  // ── 2페이지 데이터 (정답에서도 공유) ──
  const swapped    = Math.random() < 0.5;
  const leftWords  = shuffle([...printWords]);
  const rightWords = shuffle([...printWords]);
  const leftIsEn   = !swapped;

  // ── 1페이지 하단 정답 ──
  document.getElementById('pt-ans-title').textContent = '[ ' + unitLabel + ' ]';
  document.getElementById('pt-ans-sentence').innerHTML =
    printWords.map((w, i) => `<span class="pt-ans-item">${i+1}. ${w.answer} (${bankNumMap[w.answer]})</span>`).join('');
  document.getElementById('pt-ans-label-left').textContent  = leftIsEn ? '영어→한글 정답' : '한글→영어 정답';
  document.getElementById('pt-ans-label-right').textContent = leftIsEn ? '한글→영어 정답' : '영어→한글 정답';
  document.getElementById('pt-ans-left').innerHTML =
    leftWords.map((w, i) => `<span class="pt-ans-item">${i+1}. ${leftIsEn ? w.korean.split(',')[0].trim() : w.english}</span>`).join('');
  document.getElementById('pt-ans-right').innerHTML =
    rightWords.map((w, i) => `<span class="pt-ans-item">${i+1}. ${leftIsEn ? w.english : w.korean.split(',')[0].trim()}</span>`).join('');

  // ── 2페이지: 단어 쓰기 ──
  document.getElementById('pw-page-title').textContent = unitLabel + ' — 단어 쓰기';

  // 단어 수에 맞춰 행 높이 계산 (헤더 약 22mm, 제목 약 18mm, 안내문 약 8mm 제외)
  const usableMm = 297 - 10 - 8 - 22 - 18 - 8; // ≒ 231mm
  const rowMm = Math.min(16, Math.max(6, Math.floor(usableMm / words.length)));
  const rowStyle = `height:${rowMm}mm;`;

  const enList = document.getElementById('pw-en-list');
  const krList = document.getElementById('pw-kr-list');
  enList.innerHTML = '';
  krList.innerHTML = '';

  const leftHeader  = document.querySelector('#pt-page2 .pw-half:first-child .pw-section-header');
  const rightHeader = document.querySelector('#pt-page2 .pw-half:last-child .pw-section-header');
  leftHeader.textContent  = leftIsEn ? '영어 → 한글 쓰기' : '한글 → 영어 쓰기';
  rightHeader.textContent = leftIsEn ? '한글 → 영어 쓰기' : '영어 → 한글 쓰기';

  leftWords.forEach((w, i) => {
    const row = document.createElement('div');
    row.className = 'pw-row';
    row.style.cssText = rowStyle;
    const word = leftIsEn ? w.english : w.korean.split(',')[0].trim();
    row.innerHTML = `<span class="pw-no">${i + 1}.</span><span class="pw-word">${word}</span><span class="pw-line"></span>`;
    enList.appendChild(row);
  });

  rightWords.forEach((w, i) => {
    const row = document.createElement('div');
    row.className = 'pw-row';
    row.style.cssText = rowStyle;
    const word = leftIsEn ? w.korean.split(',')[0].trim() : w.english;
    row.innerHTML = `<span class="pw-no">${i + 1}.</span><span class="pw-word">${word}</span><span class="pw-line"></span>`;
    krList.appendChild(row);
  });

  // ── 3페이지: 전체 복습 ──
  document.getElementById('pr-title').textContent = unitLabel + ' — 전체';
  document.getElementById('pr-tbody').innerHTML = printWords.map(w => {
    const bw = (w.answer.length + 4) + 'ch';
    const sentFull  = w.sentence.replace('___', `<span class="pr-ans">${w.answer}</span>`);
    const blankSpaces = '\u00A0'.repeat((w.answer.length + 4) * 2);
    const sentBlank = w.sentence.replace('___', `<u style="text-decoration-color:#333">${blankSpaces}</u>`);
    return `<tr>
      <td class="pr-en">${w.english}</td>
      <td class="pr-kr">${w.korean.split(',')[0].trim()}</td>
      <td class="pr-sent">${sentFull}</td>
      <td class="pr-sent">${sentBlank}</td>
    </tr>`;
  }).join('');

  window.print();
}

function chip(text, onClick) {
  const el = document.createElement('button');
  el.className = 'chip';
  el.textContent = text;
  el.onclick = onClick;
  return el;
}

function setChipsActive(wrapperId, activeId, items, key) {
  const chips = document.querySelectorAll(`#${wrapperId} .chip`);
  chips.forEach((c, i) => c.classList.toggle('on', items[i][key] === activeId));
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function updateNavUnit() {
  if (selCourse && selType && selUnit) {
    setNavUnit(selCourse.id, selType.id, selUnit.id, selCourse.label, selType.label, selUnit.short, selUnit.label);
  }
}

async function loadWords() {
  if (!selUnit) return false;
  try {
    const r = await fetch(`data/${selCourse.id}/${selType.id}/${selUnit.id}.json`);
    const data = await r.json();
    words = data.words;
    return true;
  } catch { return false; }
}


function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
