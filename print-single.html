<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>1장 인쇄</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif; background: #f1f5f9; }

    /* ── 화면용 버튼 영역 ── */
    #screen-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; background: #fff;
      border-bottom: 2px solid #e2e8f0;
    }
    #screen-bar h2 { font-size: 16px; font-weight: 700; color: #1e293b; flex: 1; }
    .btn-print {
      padding: 10px 22px; background: #5b4fcf; color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }
    .btn-print:hover { background: #7c71e0; }
    .btn-back {
      padding: 10px 16px; background: #fff; color: #64748b;
      border: 2px solid #e2e8f0; border-radius: 10px; font-size: 14px;
      font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .btn-back:hover { border-color: #5b4fcf; color: #5b4fcf; }

    /* ── 프리뷰 래퍼 ── */
    #preview-wrap {
      padding: 20px; display: flex; justify-content: center;
    }

    /* ── A4 레이아웃 ── */
    #print-sheet {
      width: 210mm;
      min-height: 297mm;
      background: #fff;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      padding: 8mm 11mm 7mm;
      display: flex;
      flex-direction: column;
    }

    .ps-title {
      font-size: 12pt; font-weight: bold; text-align: center;
      margin-bottom: 3mm; flex-shrink: 0;
    }

    /* body: 왼쪽(문장) + 오른쪽(단어쓰기) */
    .ps-body {
      display: flex; gap: 6mm; flex: 1; min-height: 0;
    }

    /* ── 왼쪽: 문장 빈칸 ── */
    .ps-left {
      flex: 0 0 54%;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .ps-section-label {
      font-size: 8pt; font-weight: bold;
      border-bottom: 1.5px solid #333; padding-bottom: 1mm; margin-bottom: 2mm;
      flex-shrink: 0;
    }
    #ps-sent-list { flex: 1; overflow: hidden; }
    .ps-sent-item {
      display: flex; align-items: baseline; gap: 4px;
      padding: 1.5mm 0; border-bottom: 1px dotted #ccc;
    }
    .ps-sent-no   { font-size: 7.5pt; color: #999; min-width: 14px; flex-shrink: 0; }
    .ps-sent-text { font-size: 8.5pt; line-height: 1.35; flex: 1; }
    .ps-blank     {
      display: inline-block; border-bottom: 1.2px solid #333;
      min-width: 30px; vertical-align: bottom; height: 0.9em;
    }

    /* ── 오른쪽: 단어 쓰기 (위/아래 절반) ── */
    .ps-right {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }
    .ps-write-half {
      flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0;
    }
    .ps-write-half + .ps-write-half {
      margin-top: 3mm; padding-top: 3mm; border-top: 1.5px dashed #bbb;
    }
    #ps-write-left, #ps-write-right { flex: 1; overflow: hidden; }
    .ps-write-row {
      display: flex; align-items: center;
      border-bottom: 1px dotted #ddd; overflow: hidden;
    }
    .ps-write-no   { font-size: 7pt; color: #bbb; min-width: 14px; flex-shrink: 0; }
    .ps-write-word { font-size: 9pt; font-weight: 600; white-space: nowrap; padding-right: 3px; flex-shrink: 0; }
    .ps-write-line { flex: 1; border-bottom: 1px solid #bbb; margin: 0 2px 1px; align-self: flex-end; min-width: 10px; }

    /* ── Word Bank ── */
    .ps-bank {
      margin-top: 3mm; padding: 1.5mm 4mm;
      border: 1px solid #999; border-radius: 3px; flex-shrink: 0;
    }
    .ps-bank-title { font-size: 8pt; font-weight: bold; margin-bottom: 1mm; }
    #ps-bank-words { display: flex; flex-wrap: wrap; gap: 2px 8px; font-size: 8pt; }

    /* ── 정답 ── */
    .ps-answers {
      margin-top: 2.5mm; border-top: 1px dashed #bbb;
      padding-top: 2mm; flex-shrink: 0;
    }
    .ps-ans-title { font-size: 7pt; font-weight: bold; color: #666; margin-bottom: 1.5mm; }
    .ps-ans-cols  { display: flex; gap: 4mm; }
    .ps-ans-col   { flex: 1; }
    .ps-ans-label { font-size: 7pt; font-weight: bold; color: #888; margin-bottom: 0.5mm; }
    .ps-ans-list  { columns: 2; column-gap: 4px; font-size: 7.5pt; color: #555; }
    .ps-ans-item  { display: block; line-height: 1.65; }

    /* ── 인쇄 미디어 ── */
    @media print {
      @page { margin: 0; size: A4; }
      body { background: #fff; }
      #screen-bar  { display: none !important; }
      #preview-wrap { padding: 0; }
      #print-sheet  { box-shadow: none; min-height: 297mm; height: 297mm; overflow: hidden; }
    }
  </style>
</head>
<body>

<div id="screen-bar">
  <button class="btn-back" onclick="history.back()">← 돌아가기</button>
  <h2 id="bar-title">1장 인쇄</h2>
  <button class="btn-print" onclick="window.print()">🖨️ 인쇄</button>
</div>

<div id="preview-wrap">
  <div id="print-sheet">
    <div class="ps-title" id="ps-title">로딩 중…</div>

    <div class="ps-body">
      <!-- 왼쪽: 문장 빈칸 -->
      <div class="ps-left">
        <div class="ps-section-label">📝 문장 완성</div>
        <div id="ps-sent-list"></div>
      </div>

      <!-- 오른쪽: 단어 쓰기 -->
      <div class="ps-right">
        <div class="ps-write-half">
          <div class="ps-section-label" id="ps-label-left">영어 → 한글 쓰기</div>
          <div id="ps-write-left"></div>
        </div>
        <div class="ps-write-half">
          <div class="ps-section-label" id="ps-label-right">한글 → 영어 쓰기</div>
          <div id="ps-write-right"></div>
        </div>
      </div>
    </div>

    <!-- Word Bank -->
    <div class="ps-bank">
      <div class="ps-bank-title">✦ Word Bank</div>
      <div id="ps-bank-words"></div>
    </div>

    <!-- 정답 -->
    <div class="ps-answers">
      <div class="ps-ans-title" id="ps-ans-title"></div>
      <div class="ps-ans-cols">
        <div class="ps-ans-col">
          <div class="ps-ans-label">✂ 문장 정답</div>
          <div id="ps-ans-sentence" class="ps-ans-list"></div>
        </div>
        <div class="ps-ans-col">
          <div class="ps-ans-label" id="ps-ans-label-l"></div>
          <div id="ps-ans-left" class="ps-ans-list"></div>
        </div>
        <div class="ps-ans-col">
          <div class="ps-ans-label" id="ps-ans-label-r"></div>
          <div id="ps-ans-right" class="ps-ans-list"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

(async () => {
  const p = new URLSearchParams(location.search);
  const cId = p.get('c'), tId = p.get('t'), uId = p.get('u');
  if (!cId || !tId || !uId) {
    document.getElementById('ps-title').textContent = '⚠️ 단원 정보가 없습니다. 메인에서 단원을 선택 후 다시 시도하세요.';
    return;
  }

  // manifest → 라벨 구성
  let unitLabel = `${cId} ${tId} ${uId}`;
  try {
    const mRes = await fetch('data/index.json');
    const manifest = await mRes.json();
    const course = manifest.courses.find(c => c.id === cId);
    const type   = course?.types.find(t => t.id === tId);
    const unit   = type?.units.find(u => u.id === uId);
    if (course && type && unit) {
      const strip  = s => s.replace(/\d{4}년\s*\d{1,2}월\s*/g, '').trim();
      const fmtDot = s => s.replace(/(\d)\.(\d)/g, '$1·$2');
      unitLabel = `${strip(course.label)}  ${strip(type.label)}  ${fmtDot(unit.short)}. ${fmtDot(strip(unit.label))}`;
    }
  } catch {}

  // 단어 데이터 로드
  let words = [];
  try {
    const r = await fetch(`data/${cId}/${tId}/${uId}.json`);
    const data = await r.json();
    words = data.words;
  } catch {
    document.getElementById('ps-title').textContent = '⚠️ 단어 데이터를 불러올 수 없습니다.';
    return;
  }

  document.getElementById('ps-title').textContent = unitLabel;
  document.getElementById('bar-title').textContent = `1장 인쇄 — ${unitLabel}`;

  const printWords = shuffle([...words]);

  // ── 문장 빈칸 ──
  const sentList = document.getElementById('ps-sent-list');
  printWords.forEach((w, i) => {
    const bw = (w.answer.length + 4) + 'ch';
    const sentHtml = w.sentence.replace('___', `<span class="ps-blank" style="min-width:${bw}"></span>`);
    const item = document.createElement('div');
    item.className = 'ps-sent-item';
    item.innerHTML = `<span class="ps-sent-no">${i + 1}.</span><span class="ps-sent-text">${sentHtml}</span>`;
    sentList.appendChild(item);
  });

  // ── Word Bank ──
  const bankWords = shuffle([...printWords]);
  const bankNumMap = {};
  bankWords.forEach((w, i) => { bankNumMap[w.answer] = i + 1; });
  document.getElementById('ps-bank-words').innerHTML =
    bankWords.map((w, i) => `<span>${i + 1}. ${w.answer}</span>`).join(' &nbsp;·&nbsp; ');

  // ── 단어 쓰기 ──
  const leftIsEn  = Math.random() < 0.5;
  const leftWords  = shuffle([...printWords]);
  const rightWords = shuffle([...printWords]);

  document.getElementById('ps-label-left').textContent  = leftIsEn ? '영어 → 한글 쓰기' : '한글 → 영어 쓰기';
  document.getElementById('ps-label-right').textContent = leftIsEn ? '한글 → 영어 쓰기' : '영어 → 한글 쓰기';

  // 행 높이: 사용 가능한 높이를 단어 수로 나눔
  // 오른쪽 세로 공간 ≈ 170mm (각 절반 약 82mm, 헤더 5mm 제외 → 77mm)
  const rowMm = Math.min(10, Math.max(5, Math.floor(77 / words.length)));
  const rowStyle = `height:${rowMm}mm;`;

  const wLeft  = document.getElementById('ps-write-left');
  const wRight = document.getElementById('ps-write-right');

  leftWords.forEach((w, i) => {
    const row = document.createElement('div');
    row.className = 'ps-write-row';
    row.style.cssText = rowStyle;
    const word = leftIsEn ? w.english : w.korean.split(',')[0].trim();
    row.innerHTML = `<span class="ps-write-no">${i + 1}.</span><span class="ps-write-word">${word}</span><span class="ps-write-line"></span>`;
    wLeft.appendChild(row);
  });

  rightWords.forEach((w, i) => {
    const row = document.createElement('div');
    row.className = 'ps-write-row';
    row.style.cssText = rowStyle;
    const word = leftIsEn ? w.korean.split(',')[0].trim() : w.english;
    row.innerHTML = `<span class="ps-write-no">${i + 1}.</span><span class="ps-write-word">${word}</span><span class="ps-write-line"></span>`;
    wRight.appendChild(row);
  });

  // ── 정답 ──
  document.getElementById('ps-ans-title').textContent = '[ ' + unitLabel + ' ]';
  document.getElementById('ps-ans-sentence').innerHTML =
    printWords.map((w, i) => `<span class="ps-ans-item">${i + 1}. ${w.answer} (${bankNumMap[w.answer]})</span>`).join('');
  document.getElementById('ps-ans-label-l').textContent = leftIsEn ? '영어→한글 정답' : '한글→영어 정답';
  document.getElementById('ps-ans-label-r').textContent = leftIsEn ? '한글→영어 정답' : '영어→한글 정답';
  document.getElementById('ps-ans-left').innerHTML =
    leftWords.map((w, i) => `<span class="ps-ans-item">${i + 1}. ${leftIsEn ? w.korean.split(',')[0].trim() : w.english}</span>`).join('');
  document.getElementById('ps-ans-right').innerHTML =
    rightWords.map((w, i) => `<span class="ps-ans-item">${i + 1}. ${leftIsEn ? w.english : w.korean.split(',')[0].trim()}</span>`).join('');
})();
</script>
</body>
</html>
